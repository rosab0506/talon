# CodeQL analysis for code scanning (advanced setup). Uses .github/codeql-config.yml
# to exclude false positives (e.g. go/weak-sensitive-data-hashing on cache key derivation).
#
# If you see "CodeQL analyses from advanced configurations cannot be processed when
# the default setup is enabled": disable Default setup so this workflow is used instead.
# Repo: Settings > Code security and analysis > Code scanning > turn off Default setup,
# or use "Advanced" so only this workflow runs. Org: ensure policy allows advanced setup.
name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          config-file: .github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
