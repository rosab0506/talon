# Talon Agent Policy — CrewAI
# Generated by: talon init --pack crewai
# This policy governs CrewAI multi-agent crews via the Talon gateway.

agent:
  name: crewai-crew
  description: CrewAI multi-agent crew governed by Talon
  version: "1.0.0"
  model_tier: 1

capabilities:
  allowed_tools:
    - web_search
    - file_read
    - calculator
    - code_interpreter
  forbidden_patterns:
    - "DELETE FROM"
    - "DROP TABLE"
    - "rm -rf"
    - "sudo"

policies:
  cost_limits:
    per_request: 2.0
    daily: 25.0
    monthly: 500.0
  resource_limits:
    timeout:
      operation: "60s"
      tool_execution: "5m"
      agent_total: "30m"
  rate_limits:
    requests_per_minute: 60
    concurrent_executions: 10
  data_classification:
    input_scan: true
    output_scan: true
    redact_pii: true
  model_routing:
    tier_0:
      primary: gpt-4o-mini
      location: any
    tier_1:
      primary: gpt-4o
      fallback: gpt-4o-mini
      location: eu
    tier_2:
      primary: gpt-4o
      location: eu
      bedrock_only: true

compliance:
  frameworks: [gdpr]
  data_residency: eu
  ai_act_risk_level: limited
