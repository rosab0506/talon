# Talon Infrastructure Configuration — CrewAI Gateway (talon.config.yaml)
# Generated by: talon init --pack crewai
#
# CrewAI uses OpenAI-compatible APIs. Point CrewAI's base URL to Talon.
# Each crew member (agent) can use its own caller for per-agent governance and audit.

llm:
  pricing_file: "pricing/models.yaml"

llm_provider: openai
log_level: info
log_format: console

evidence:
  type: sqlite
  path: ~/.talon/evidence.db

cache:
  enabled: false
  default_ttl: 3600
  similarity_threshold: 0.92
  max_entries_per_tenant: 10000

secrets_key_env: TALON_SECRETS_KEY

tenants:
  - id: default
    display_name: Default Tenant
    budgets:
      daily: 100.0
      monthly: 2000.0
    rate_limit: 120

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "shadow"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "https://api.openai.com"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  callers:
    - name: "talon-gw-crew-researcher"
      tenant_key: "talon-gw-crew-researcher"
      tenant_id: "default"
      team: "crewai"
      allowed_providers: ["openai"]
      policy_overrides:
        pii_action: "warn"
        max_daily_cost: 15.00
        max_monthly_cost: 300.00

    - name: "talon-gw-crew-writer"
      tenant_key: "talon-gw-crew-writer"
      tenant_id: "default"
      team: "crewai"
      allowed_providers: ["openai"]
      policy_overrides:
        pii_action: "redact"
        max_daily_cost: 15.00
        max_monthly_cost: 300.00

    - name: "talon-gw-crew-reviewer"
      tenant_key: "talon-gw-crew-reviewer"
      tenant_id: "default"
      team: "crewai"
      allowed_providers: ["openai"]
      policy_overrides:
        pii_action: "warn"
        max_daily_cost: 15.00
        max_monthly_cost: 300.00

  default_policy:
    default_pii_action: "warn"
    response_pii_action: "warn"
    max_daily_cost: 50.00
    max_monthly_cost: 1000.00
    require_caller_id: true
    log_prompts: true
    log_responses: false
    tool_policy_action: "filter"
    forbidden_tools:
      - "shell_command"
      - "file_system_delete"
      - "database_drop"
    attachment_policy:
      action: "warn"
      injection_action: "warn"
      max_file_size_mb: 10

  rate_limits:
    global_requests_per_min: 200
    per_caller_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 120s
    stream_idle_timeout: 60s
