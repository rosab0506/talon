# DORA Compliance Overlay (Financial Services)
# Generated by: talon init --compliance dora
# Addresses: Art. 6, 8, 11, 12, 28

policies:
  cost_limits:
    daily: 50.0
    monthly: 1000.0

  data_classification:
    input_scan: true
    output_scan: true
    redact_pii: true
    block_on_pii: true   # Strict: block on any PII for financial data

  model_routing:
    tier_0:
      location: eu       # Even non-sensitive financial data stays in EU
    tier_1:
      location: eu
      bedrock_only: true
    tier_2:
      location: eu
      bedrock_only: true

audit:
  log_level: full
  retention_days: 1825   # 5 years for financial record keeping
  include_prompts: true
  include_responses: true
  include_original_prompts: false    # Default false: stores redacted prompt when redact_input is active (GDPR Art. 5(1)(c))

compliance:
  frameworks: [dora, gdpr]
  data_residency: eu
