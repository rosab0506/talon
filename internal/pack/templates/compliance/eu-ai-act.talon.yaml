# EU AI Act Compliance Overlay
# Generated by: talon init --compliance eu-ai-act
# Addresses: Art. 9, 11, 13, 14, 15

policies:
  data_classification:
    input_scan: true
    output_scan: true

audit:
  log_level: full        # Art. 11: Technical documentation
  retention_days: 365
  include_prompts: true
  include_responses: true

compliance:
  frameworks: [eu-ai-act]
  ai_act_risk_level: limited    # Adjust: minimal | limited | high
  human_oversight: on-demand    # Art. 14: Human oversight
  plan_review:
    require_for_tools: true     # Art. 14: review when tools are used
    require_for_tier: "2"       # review for sensitive data
    cost_threshold: 10.0       # review above cost threshold (EUR)
    timeout_minutes: 60
    notify_webhook: ""
