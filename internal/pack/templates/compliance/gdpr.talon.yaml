# GDPR Compliance Overlay
# Generated by: talon init --compliance gdpr
# Addresses: Art. 5, 6, 25, 30, 32, 44-49

policies:
  data_classification:
    input_scan: true
    output_scan: true
    redact_pii: true
    block_on_pii: false   # Set to true for strict mode

  model_routing:
    tier_1:
      location: eu       # Art. 44-49: Data stays in EU
    tier_2:
      location: eu
      bedrock_only: true # Sensitive data only via EU Bedrock

audit:
  log_level: detailed
  retention_days: 365     # Art. 30: Records of processing activities
  include_prompts: true
  include_responses: false           # Minimize stored personal data (Art. 5)
  include_original_prompts: false    # When redact_input is active, store only the redacted prompt (Art. 5(1)(c) data minimization)

compliance:
  frameworks: [gdpr]
  data_residency: eu
