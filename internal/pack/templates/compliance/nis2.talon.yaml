# NIS2 Compliance Overlay
# Generated by: talon init --compliance nis2
# Addresses: Art. 21, 23, 24

policies:
  rate_limits:
    requests_per_minute: 30
    concurrent_executions: 5

  time_restrictions:
    enabled: true
    allowed_hours: "06:00-22:00"
    timezone: "Europe/Berlin"
    weekends: true

audit:
  log_level: full
  retention_days: 730    # 2 years for incident investigation
  include_prompts: true
  include_responses: true

compliance:
  frameworks: [nis2]
